services:
  - type: web
    name: n8n-ama
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_HOST
        value: your-supabase-host.supabase.co
      - key: DB_POSTGRESDB_PORT
        value: 5432
      - key: DB_POSTGRESDB_DATABASE
        value: postgres
      - key: DB_POSTGRESDB_USER
        value: postgres
      - key: DB_POSTGRESDB_PASSWORD
        value: your-supabase-password
      - key: DB_POSTGRESDB_SSL_ENABLED
        value: true
      - key: N8N_ENCRYPTION_KEY
        value: ama2026secret
      - key: N8N_HOST
        value: 0.0.0.0
      - key: N8N_PORT
        value: 5678
      - key: NODE_ENV
        value: production
      - key: WEBHOOK_URL
        value: https://n8n-ama.onrender.com
